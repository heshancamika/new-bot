<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHADOW-X-MINI - QR Code</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            font-family: Arial, sans-serif;
        }
        .container {
            text-align: center;
            background: rgba(255,255,255,0.1);
            padding: 30px;
            border-radius: 20px;
        }
        input {
            padding: 12px;
            border-radius: 25px;
            border: none;
            width: 250px;
            margin: 10px;
        }
        button {
            padding: 12px 25px;
            background: linear-gradient(135deg, #00bfff, #0066cc);
            border: none;
            border-radius: 25px;
            color: white;
            cursor: pointer;
        }
        #qrCode {
            margin-top: 20px;
        }
        img {
            background: white;
            padding: 15px;
            border-radius: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>🔗 SHADOW-X-MINI QR Pairing</h2>
        <input type="tel" id="number" placeholder="+94729101856">
        <button onclick="generateQR()">Generate QR Code</button>
        <div id="qrCode"></div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.7.9/axios.min.js"></script>
    <script>
        async function generateQR() {
            let number = document.getElementById('number').value.replace(/[^0-9]/g, '');
            if (!number) return alert('Enter number!');
            const { data } = await axios.get(`/code?number=${number}&type=qr`);
            if (data.qr) {
                document.getElementById('qrCode').innerHTML = `<img src="${data.qr}" width="250">`;
            }
        }
    </script>
</body>
</html>
